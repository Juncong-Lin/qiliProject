<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qilitrading.com | Maintenance</title>
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="description" content="Qilitrading.com is temporarily offline for scheduled maintenance.">
    <style>
      :root {
        color-scheme: light;
        --bg-top: #f3efe7;
        --bg-bottom: #d6e2ea;
        --panel: rgba(255, 255, 255, 0.88);
        --panel-border: rgba(12, 37, 54, 0.12);
        --text-main: #173042;
        --text-muted: #566775;
        --accent: #b8672f;
        --shadow: 0 24px 60px rgba(18, 40, 54, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text-main);
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.82), transparent 38%),
          linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
      }

      main {
        width: min(680px, 100%);
        padding: 48px 40px;
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 16px;
        font-size: 0.82rem;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.3rem, 5vw, 4rem);
        line-height: 1.05;
      }

      p {
        margin: 18px auto 0;
        max-width: 34rem;
        font-size: 1.05rem;
        line-height: 1.7;
        color: var(--text-muted);
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 28px;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(184, 103, 47, 0.1);
        color: var(--text-main);
        font-size: 0.95rem;
      }

      .status::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent);
      }

      @media (max-width: 640px) {
        main {
          padding: 38px 24px;
          border-radius: 22px;
        }

        p {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Scheduled Maintenance</p>
      <h1>Website Temporarily Offline</h1>
      <p>
        We are updating Qilitrading.com and will restore the full site after maintenance is complete.
        Please check back later.
      </p>
      <div class="status">Maintenance page active</div>
    </main>
  </body>
</html>
